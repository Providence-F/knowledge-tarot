<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 320" width="220" height="320">
  <defs>
    <pattern id="bgPattern" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M20 0 L40 20 L20 40 L0 20 Z" fill="none" stroke="#e5e5e5" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- White background -->
  <rect width="220" height="320" rx="10" ry="10" fill="#fff"/>

  <!-- Geometric pattern -->
  <rect width="220" height="320" rx="10" ry="10" fill="url(#bgPattern)"/>

  <!-- Black border -->
  <rect x="8" y="8" width="204" height="304" rx="7" ry="7" fill="none" stroke="#000" stroke-width="1.5"/>

  <!-- Corner dots -->
  <circle cx="20" cy="20" r="2" fill="#000"/>
  <circle cx="200" cy="20" r="2" fill="#000"/>
  <circle cx="20" cy="300" r="2" fill="#000"/>
  <circle cx="200" cy="300" r="2" fill="#000"/>

  <!-- Central symbol: open book with eye -->
  <g transform="translate(110, 155)" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left page -->
    <path d="M-4,-20 Q-30,-16 -35,0 L-35,30 Q-30,28 -4,24 Z"/>
    <!-- Right page -->
    <path d="M4,-20 Q30,-16 35,0 L35,30 Q30,28 4,24 Z"/>
    <!-- Spine -->
    <line x1="0" y1="-22" x2="0" y2="24"/>

    <!-- Eye -->
    <g transform="translate(0, -38)">
      <path d="M-18,0 Q0,-14 18,0 Q0,14 -18,0 Z" stroke-width="1.5"/>
      <circle cx="0" cy="0" r="5" stroke-width="1.2"/>
      <circle cx="0" cy="0" r="2" fill="#000"/>
    </g>

    <!-- Rays -->
    <line x1="0" y1="-56" x2="0" y2="-62" stroke-width="1" opacity="0.4"/>
    <line x1="-12" y1="-52" x2="-16" y2="-57" stroke-width="1" opacity="0.3"/>
    <line x1="12" y1="-52" x2="16" y2="-57" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- Text lines under book -->
  <g transform="translate(110, 200)" stroke="#ccc" stroke-width="0.8">
    <line x1="-25" y1="0" x2="25" y2="0"/>
    <line x1="-20" y1="5" x2="20" y2="5"/>
    <line x1="-22" y1="10" x2="22" y2="10"/>
  </g>
</svg>
