<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="知识塔罗 —— 从你的知识库中寻找指引">
  <title>知识塔罗</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <!-- HEADER -->
  <header class="header">
    <div class="privacy-area" id="privacy-toggle-area">
      <span class="mode-label" id="mode-label">本地模式</span>
      <button
        type="button"
        role="switch"
        aria-checked="false"
        aria-label="切换隐私模式"
        id="privacy-switch"
        class="privacy-switch"
      >
        <span class="privacy-switch-knob"></span>
      </button>
      <div class="privacy-tooltip hidden" id="privacy-tooltip">
        <p>云端模式会将你的问题和牌面信息发送到 AI 服务进行解读。数据处理受服务商隐私政策约束。</p>
      </div>
    </div>
    <h1 class="site-title">知识塔罗</h1>
    <p class="site-subtitle">从你的知识库中寻找指引</p>
  </header>

  <!-- MAIN -->
  <main class="main">

    <!-- QUESTION SECTION -->
    <section class="question-section" id="question-section">
      <label for="user-question" class="label">你的问题</label>
      <textarea
        id="user-question"
        rows="3"
        placeholder="你带着什么问题？"
        class="textarea"
      ></textarea>

      <!-- Spread type buttons -->
      <div class="spread-buttons">
        <button type="button" data-spread="single" class="spread-btn active">日签</button>
        <button type="button" data-spread="three" class="spread-btn">三牌阵</button>
      </div>

      <!-- Draw button -->
      <div class="draw-area">
        <button type="button" id="draw-btn" class="draw-btn">开始抽牌</button>
      </div>
    </section>

    <!-- CARD AREA -->
    <section class="card-area hidden" id="spread-area">
      <!-- Single card spread -->
      <div class="spread-single hidden" id="spread-single">
        <div class="card-slot" data-position="present"></div>
      </div>

      <!-- Three card spread -->
      <div class="spread-three hidden" id="spread-three">
        <div class="card-column">
          <span class="card-position-label">过去</span>
          <div class="card-slot" data-position="past"></div>
        </div>
        <div class="card-column">
          <span class="card-position-label">现在</span>
          <div class="card-slot" data-position="present"></div>
        </div>
        <div class="card-column">
          <span class="card-position-label">未来</span>
          <div class="card-slot" data-position="future"></div>
        </div>
      </div>
    </section>

    <!-- INTERPRETATION AREA -->
    <section class="interpretation hidden" id="reading-area">
      <div class="reading-panel">
        <div class="reading-header">
          <h2 class="reading-title">牌面解读</h2>
          <span class="source-indicator" id="source-indicator"></span>
        </div>
        <div class="reading-content" id="reading-content"></div>
      </div>
    </section>

    <!-- EMPTY STATE -->
    <section class="empty-state hidden" id="empty-state">
      <p class="empty-message" id="empty-message">你的牌组中还没有这个类别的牌，去写一些笔记吧</p>
    </section>

    <!-- DEEP DIVE MODAL -->
    <div class="modal-overlay hidden" id="deep-dive-overlay" role="dialog" aria-modal="true" aria-label="牌面详情">
      <div class="modal-panel">
        <button type="button" class="modal-close" id="deep-dive-close" aria-label="关闭">&times;</button>
        <div class="modal-content" id="deep-dive-content"></div>
      </div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="stats-bar" id="stats-bar">
    <div class="stats-inner">
      <div class="stats-info" id="stats-info">
        <span id="stat-total">0 张牌</span>
        <span class="stats-divider">|</span>
        <span id="stat-suits"></span>
      </div>
      <div class="footer-actions">
        <button type="button" id="save-btn" class="footer-btn">保存解读</button>
        <button type="button" id="redraw-btn" class="footer-btn footer-btn-secondary">再抽一次</button>
      </div>
    </div>
  </footer>

  <script type="module" src="js/app.js"></script>
</body>
</html>
