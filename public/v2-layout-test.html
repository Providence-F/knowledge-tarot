<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>v2 layout test</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css?v=20260618d">
  <script>
    tailwind.config = {
      theme: { extend: { colors: { tarot: {
        bg:'#fff',card:'#fff',gold:'#000',ivory:'#1a1a1a',muted:'#888',border:'#e5e5e5',accent:'#f5f5f5'
      } } } }
    }
  </script>
</head>
<body class="bg-tarot-bg text-tarot-ivory font-sans">
  <main class="max-w-6xl mx-auto px-4 py-8">
    <div id="cardsArea">
      <div id="cardsContainer" class="grid gap-6 md:gap-8 justify-center mx-auto mb-10"></div>
    </div>
  </main>

  <div id="reactionWidget" class="fixed z-[45] bottom-4 right-4 md:bottom-6 md:right-6 left-4 md:left-auto">
    <button id="reactionWidgetBtn" class="reaction-widget-button">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.86 9.86 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
      <span class="reaction-widget-button-label">写下第一反应</span>
    </button>
    <div id="reactionWidgetPanel" class="reaction-widget-panel hidden">
      <div class="reaction-widget-header">
        <div class="font-medium text-sm text-black">写下你的第一反应</div>
        <button class="text-tarot-muted hover:text-black"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M6 18L18 6M6 6l12 12"/></svg></button>
      </div>
      <div class="reaction-widget-body">
        <textarea rows="4" class="w-full p-3 bg-white border border-tarot-border rounded-xl text-sm" placeholder="一句话写下来…"></textarea>
      </div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const n = parseInt(params.get('n') || '3', 10);
    const showPanel = params.get('panel') === '1';
    const positions = ['过去', '现在', '未来'];
    const titles = ['沉默的边缘', '正在被磨亮的刀', '尚未抵达的港'];

    const list = document.getElementById('cardsContainer');
    list.classList.remove('grid-cols-1','md:grid-cols-3','max-w-fit');
    if (n >= 3) list.classList.add('grid-cols-1','md:grid-cols-3','max-w-fit');
    else list.classList.add('grid-cols-1','max-w-fit');

    for (let i = 0; i < n; i++) {
      const slot = document.createElement('div');
      slot.className = 'flex flex-col items-center';
      if (n >= 3) {
        const lbl = document.createElement('div');
        lbl.className = 'position-outer-label';
        lbl.textContent = positions[i] || ('位 '+i);
        slot.appendChild(lbl);
      }
      const w = document.createElement('div');
      w.className = 'card-wrapper';
      w.innerHTML = `
        <div class="card-inner" style="transform: rotateY(180deg)">
          <div class="card-face card-front">
            <div class="flex items-center justify-between mb-3">
              <span class="text-xs text-tarot-muted">过去的你</span>
            </div>
            <h3 class="font-serif font-bold text-2xl text-black mb-3 leading-snug">${titles[i] || '示例标题'}</h3>
            <div class="flex-1 overflow-hidden text-sm text-tarot-ivory leading-relaxed italic">这里是一段陌生化的提示，不会暴露原文。</div>
            <div class="mt-3 pt-2 text-[11px] text-tarot-muted text-center border-t border-tarot-border">翻面看原文 · 来源</div>
          </div>
        </div>`;
      slot.appendChild(w);
      list.appendChild(slot);
    }

    if (showPanel) {
      document.getElementById('reactionWidgetBtn').classList.add('hidden');
      document.getElementById('reactionWidgetPanel').classList.remove('hidden');
    }
  </script>
</body>
</html>
